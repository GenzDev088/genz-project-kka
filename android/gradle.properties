org.gradle.jvmargs=-Xmx6G -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=512m -Dkotlin.daemon.jvm.options="-Xmx2G"
android.useAndroidX=true
android.enableJetifier=true

# FIX 1: Opt-out dari new DSL AGP 9 behavior yang belum didukung Flutter
android.newDsl=false

# FIX 2: Nonaktifkan configuration cache yang menyebabkan NullPointerException
#         dan masalah "Already watching path"
org.gradle.configuration-cache=false
org.gradle.caching=false

# FIX 3: Nonaktifkan file system watching yang menyebabkan "Already watching path"
org.gradle.vfs.watch=false

# Build lebih konservatif untuk menghindari race/configuration issue pada plugin lama
org.gradle.parallel=false
org.gradle.daemon=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
kotlin.incremental=false
